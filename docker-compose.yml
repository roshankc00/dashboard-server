services:
  mongodb:
    image: mongo:7
    container_name: dashboard_mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-devpassword}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-dashboard}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-devpassword}@127.0.0.1:27017/admin",
          "--eval",
          "db.adminCommand({ ping: 1 })",
          "--quiet",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  redis:
    image: redis:7-alpine
    container_name: dashboard_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  mongo_data:
  redis_data:
